    let state = { lang: 'vi', fcIdx: 0 };

    function switchTab(t) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(t + '-view').classList.add('active');
    }

    function toggleLanguage() {
        state.lang = state.lang === 'vi' ? 'en' : 'vi';
        translateUI();
        renderFC();
    }

    function translateUI() {
        const t = uiTexts[state.lang];
        document.getElementById('tab-learn').innerText = t.tabLearn;
        document.getElementById('tab-quiz').innerText = t.tabQuiz;
        document.getElementById('lang-btn').innerText = t.langBtn;
        document.getElementById('btn-prev').innerText = t.btnPrev;
        document.getElementById('btn-next').innerText = t.btnNext;
        document.getElementById('quiz-title').innerText = t.quizTitle;
        document.getElementById('quiz-desc').innerText = t.quizDesc;
        updateFCStatus();
    }

    function renderFC() {
        const q = quizData[state.fcIdx];
        const data = q[state.lang];
        const t = uiTexts[state.lang];
        
        let codeHtml = data.code ? `<pre class="code-snippet"><code>${data.code}</code></pre>` : '';

        document.getElementById('fc-front').innerHTML = `
            <div class="q-header"><span class="badge-topic">${q.category}</span></div>
            <div class="question-box">
                <p class="question-text">${data.question}</p>
                ${codeHtml}
            </div>
            <ul class="options-list">
                ${data.options.map((o, i) => `<li data-label="${String.fromCharCode(65+i)}">${o.substring(3)}</li>`).join('')}
            </ul>
        `;

        document.getElementById('fc-back').innerHTML = `
            <div class="badge-topic" style="background:#d1e7dd; color:#0f5132">${t.ansLabel} ${data.answer}</div>
            <div style="margin-top:30px; font-size:16px; line-height:1.7;">
                <b style="color:var(--primary-color)">${t.expLabel}</b><br>${data.explanation}
            </div>
        `;
    }

    function navFC(step) {
        let newIdx = state.fcIdx + step;
        if(newIdx >= 0 && newIdx < quizData.length) {
            state.fcIdx = newIdx;
            document.getElementById('fc-main').classList.remove('flipped');
            renderFC();
            updateFCStatus();
        }
    }

    function updateFCStatus() {
        const t = uiTexts[state.lang];
        document.getElementById('fc-counter').innerText = `${t.counterOf} ${state.fcIdx + 1} ${t.counterTotal} ${quizData.length}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        translateUI();
        renderFC();
    });
</script>
